<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>URL Analyser</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .popup-container {
      padding: 24px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin: 10px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .logo {
      font-size: 24px;
      font-weight: 900;
      color: #00ffff;
    }
    .status-card {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 24px;
    }
    .status-label {
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 8px;
    }
    .status-value {
      font-size: 18px;
      font-weight: 900;
    }
    .safe { color: #00ff88; }
    .suspicious { color: #ffbb00; }
    .danger { color: #ff4d4d; }
    
    .scan-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      background: #00ffff;
      color: #000;
      font-size: 14px;
      font-weight: 900;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .scan-btn:hover {
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    }
    .scan-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .loader {
      width: 16px;
      height: 16px;
      border: 2px solid #000;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .url-text {
      font-size: 12px;
      opacity: 0.5;
      word-break: break-all;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <header>
      <div class="logo">URL Analyser</div>
    </header>
    
    <div class="status-card">
      <div class="status-label">Current Page Status</div>
      <div id="status-value" class="status-value">Ready to scan...</div>
      <div id="url-text" class="url-text"></div>
    </div>

    <button id="scan-btn" class="scan-btn">
      <span>Scan Page</span>
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
